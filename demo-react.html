<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo React 19 — useState & useEffect</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.75rem;
      margin-bottom: 0.25rem;
      color: #f8fafc;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 0.875rem;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      background: #1e40af;
      color: #bfdbfe;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      vertical-align: middle;
      margin-left: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
      color: #f1f5f9;
    }

    .card .desc {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 1.25rem;
      line-height: 1.5;
    }

    .hook-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .hook-state  { color: #34d399; }
    .hook-effect { color: #818cf8; }
    .hook-both   { color: #fb923c; }

    .value-display {
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
      padding: 1rem 0;
      color: #f8fafc;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    .btn-primary   { background: #3b82f6; color: #fff; }
    .btn-secondary { background: #334155; color: #cbd5e1; }
    .btn-danger    { background: #ef4444; color: #fff; }
    .btn-success   { background: #22c55e; color: #fff; }

    input[type="text"], input[type="number"] {
      width: 100%;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
      margin-bottom: 0.75rem;
      outline: none;
    }

    input:focus { border-color: #3b82f6; }

    .output-box {
      background: #0f172a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.75rem;
      min-height: 2.5rem;
      line-height: 1.6;
    }

    .output-box .highlight { color: #f8fafc; font-weight: 600; }

    .timer-display {
      font-size: 2.5rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      text-align: center;
      padding: 0.75rem 0;
      color: #fbbf24;
    }

    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .dot-green  { background: #22c55e; }
    .dot-red    { background: #ef4444; }
    .dot-yellow { background: #fbbf24; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .fetch-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0;
      border-bottom: 1px solid #1e293b;
      font-size: 0.8rem;
    }

    .fetch-item:last-child { border-bottom: none; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .divider {
      border: none;
      border-top: 1px solid #334155;
      margin: 1rem 0;
    }
  </style>
</head>
<body>

<h1>Demo React 19 <span class="badge">React 19</span></h1>
<p class="subtitle">useState &amp; useEffect — tanpa build tool, via ESM CDN</p>

<div id="root"></div>

<script type="module">
  import React, { useState, useEffect, useRef } from "https://esm.sh/react@19/?dev";
  import { createRoot } from "https://esm.sh/react-dom@19/client?dev";

  // ─── 1. Counter — useState dasar ──────────────────────────────────────────
  function CounterCard() {
    const [count, setCount] = useState(0);

    return React.createElement("div", { className: "card" },
      React.createElement("div", { className: "hook-label hook-state" }, "useState"),
      React.createElement("h2", null, "Counter Sederhana"),
      React.createElement("p", { className: "desc" },
        "State integer yang diubah dengan tombol. Setiap panggilan setState memicu re-render."
      ),
      React.createElement("div", { className: "value-display" }, count),
      React.createElement("div", { className: "btn-row" },
        React.createElement("button", { className: "btn-secondary", onClick: () => setCount(c => c - 1) }, "−"),
        React.createElement("button", { className: "btn-secondary", onClick: () => setCount(0) }, "Reset"),
        React.createElement("button", { className: "btn-primary",   onClick: () => setCount(c => c + 1) }, "+"),
      )
    );
  }

  // ─── 2. Toggle — useState boolean ─────────────────────────────────────────
  function ToggleCard() {
    const [on, setOn] = useState(false);

    return React.createElement("div", { className: "card" },
      React.createElement("div", { className: "hook-label hook-state" }, "useState"),
      React.createElement("h2", null, "Toggle Boolean"),
      React.createElement("p", { className: "desc" },
        "State boolean. Fungsi updater menerima nilai sebelumnya sehingga toggle selalu akurat."
      ),
      React.createElement("div", { className: "value-display", style: { color: on ? "#22c55e" : "#ef4444" } },
        on ? "ON" : "OFF"
      ),
      React.createElement("div", { className: "btn-row", style: { justifyContent: "center" } },
        React.createElement("button", {
          className: on ? "btn-danger" : "btn-success",
          onClick: () => setOn(prev => !prev)
        }, on ? "Matikan" : "Nyalakan")
      )
    );
  }

  // ─── 3. Input sinkron — useState string ───────────────────────────────────
  function InputCard() {
    const [name, setName] = useState("");
    const wordCount = name.trim() === "" ? 0 : name.trim().split(/\s+/).length;

    return React.createElement("div", { className: "card" },
      React.createElement("div", { className: "hook-label hook-state" }, "useState"),
      React.createElement("h2", null, "Input Terkontrol"),
      React.createElement("p", { className: "desc" },
        "State string disinkronkan dengan input via event onChange — pola controlled component."
      ),
      React.createElement("input", {
        type: "text",
        placeholder: "Ketik nama kamu…",
        value: name,
        onChange: e => setName(e.target.value)
      }),
      React.createElement("div", { className: "output-box" },
        name
          ? React.createElement("span", null,
              "Halo, ", React.createElement("span", { className: "highlight" }, name), "! ",
              `(${name.length} karakter, ${wordCount} kata)`
            )
          : "Belum ada input."
      )
    );
  }

  // ─── 4. Document title sync — useEffect ───────────────────────────────────
  function TitleSyncCard() {
    const [title, setTitle] = useState("Demo React 19");

    useEffect(() => {
      document.title = title;
      // cleanup: kembalikan judul saat komponen unmount
      return () => { document.title = "Demo React 19"; };
    }, [title]);

    return React.createElement("div", { className: "card" },
      React.createElement("div", { className: "hook-label hook-effect" }, "useEffect"),
      React.createElement("h2", null, "Sinkronisasi Document Title"),
      React.createElement("p", { className: "desc" },
        "useEffect menyinkronkan state ke sistem luar (document.title). Berjalan setiap kali 'title' berubah."
      ),
      React.createElement("input", {
        type: "text",
        placeholder: "Tulis judul halaman…",
        value: title,
        onChange: e => setTitle(e.target.value)
      }),
      React.createElement("div", { className: "output-box" },
        "Tab browser: ", React.createElement("span", { className: "highlight" }, title)
      )
    );
  }

  // ─── 5. Stopwatch — useEffect + cleanup ───────────────────────────────────
  function StopwatchCard() {
    const [running, setRunning] = useState(false);
    const [ms, setMs] = useState(0);

    useEffect(() => {
      if (!running) return;

      const id = setInterval(() => setMs(t => t + 10), 10);

      // cleanup: hentikan interval saat running berubah atau komponen unmount
      return () => clearInterval(id);
    }, [running]);

    const fmt = (n) => {
      const min  = String(Math.floor(n / 60000)).padStart(2, "0");
      const sec  = String(Math.floor((n % 60000) / 1000)).padStart(2, "0");
      const cent = String(Math.floor((n % 1000) / 10)).padStart(2, "0");
      return `${min}:${sec}.${cent}`;
    };

    return React.createElement("div", { className: "card" },
      React.createElement("div", { className: "hook-label hook-effect" }, "useEffect + cleanup"),
      React.createElement("h2", null, "Stopwatch"),
      React.createElement("p", { className: "desc" },
        "setInterval dibuat di dalam useEffect. Cleanup function menghapusnya agar tidak bocor memori."
      ),
      React.createElement("div", { className: "timer-display" }, fmt(ms)),
      React.createElement("div", { className: "btn-row", style: { justifyContent: "center" } },
        React.createElement("button", {
          className: running ? "btn-danger" : "btn-success",
          onClick: () => setRunning(r => !r)
        }, running ? "Hentikan" : "Mulai"),
        React.createElement("button", {
          className: "btn-secondary",
          onClick: () => { setRunning(false); setMs(0); }
        }, "Reset")
      )
    );
  }

  // ─── 6. Fetch data — useEffect async + loading state ──────────────────────
  function FetchCard() {
    const [userId, setUserId]   = useState(1);
    const [user, setUser]       = useState(null);
    const [loading, setLoading] = useState(false);
    const [error, setError]     = useState(null);

    useEffect(() => {
      let cancelled = false; // cegah update state setelah cleanup

      setLoading(true);
      setError(null);

      fetch(`https://jsonplaceholder.typicode.com/users/${userId}`)
        .then(res => {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return res.json();
        })
        .then(data => {
          if (!cancelled) { setUser(data); setLoading(false); }
        })
        .catch(err => {
          if (!cancelled) { setError(err.message); setLoading(false); }
        });

      // cleanup: batalkan update jika userId berubah sebelum fetch selesai
      return () => { cancelled = true; };
    }, [userId]);

    const statusIcon = () => {
      if (loading) return React.createElement("span", null,
        React.createElement("span", { className: "status-dot dot-yellow" }), "Memuat…"
      );
      if (error) return React.createElement("span", { style: { color: "#ef4444" } },
        React.createElement("span", { className: "status-dot dot-red" }), `Error: ${error}`
      );
      return React.createElement("span", null,
        React.createElement("span", { className: "status-dot dot-green" }), "Berhasil"
      );
    };

    return React.createElement("div", { className: "card" },
      React.createElement("div", { className: "hook-label hook-both" }, "useState + useEffect"),
      React.createElement("h2", null, "Fetch Data dari API"),
      React.createElement("p", { className: "desc" },
        "useEffect memicu fetch saat userId berubah. Variabel 'cancelled' mencegah race condition."
      ),
      React.createElement("div", { style: { display: "flex", gap: "0.5rem", marginBottom: "0.75rem" } },
        [1,2,3,4,5].map(id =>
          React.createElement("button", {
            key: id,
            className: userId === id ? "btn-primary" : "btn-secondary",
            onClick: () => setUserId(id),
            style: { flex: 1, padding: "0.4rem 0" }
          }, `#${id}`)
        )
      ),
      React.createElement("div", { className: "output-box", style: { fontSize: "0.75rem" } },
        statusIcon(),
        user && !loading && React.createElement("div", null,
          React.createElement("hr", { className: "divider" }),
          React.createElement("div", { className: "fetch-item" },
            React.createElement("div", { className: "avatar" }, user.name[0]),
            React.createElement("div", null,
              React.createElement("div", { className: "highlight" }, user.name),
              React.createElement("div", null, user.email)
            )
          ),
          React.createElement("div", { className: "fetch-item" }, "🌐 ", user.website),
          React.createElement("div", { className: "fetch-item" }, "🏢 ", user.company?.name),
          React.createElement("div", { className: "fetch-item" }, "📍 ", user.address?.city)
        )
      )
    );
  }

  // ─── App root ──────────────────────────────────────────────────────────────
  function App() {
    return React.createElement("div", { className: "grid" },
      React.createElement(CounterCard),
      React.createElement(ToggleCard),
      React.createElement(InputCard),
      React.createElement(TitleSyncCard),
      React.createElement(StopwatchCard),
      React.createElement(FetchCard),
    );
  }

  createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

</body>
</html>
