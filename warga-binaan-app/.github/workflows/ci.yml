name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: warga-binaan-app/package-lock.json

      - name: Install dependencies
        working-directory: warga-binaan-app
        run: npm ci

      - name: Lint
        working-directory: warga-binaan-app
        run: npm run lint

      - name: Build
        working-directory: warga-binaan-app
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000/api
